<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🚙</text></svg>"
    />
    <title>MUD — No roads. Low gear. Full send.</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0c1014;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
      }
      .hud-panel {
        position: absolute;
        top: 16px;
        left: 16px;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(10, 16, 22, 0.55);
        color: #e8eef4;
        user-select: none;
        pointer-events: none;
      }
      .hud-speed {
        font-size: 30px;
        font-weight: 700;
        line-height: 1.1;
      }
      .hud-speed small {
        font-size: 13px;
        font-weight: 400;
        opacity: 0.7;
      }
      .hud-row {
        display: flex;
        gap: 10px;
        align-items: baseline;
        font-size: 13px;
        opacity: 0.9;
      }
      .hud-slide {
        color: #ffb454;
        font-weight: 700;
        visibility: hidden;
      }
      .hud-help {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(232, 238, 244, 0.75);
        background: rgba(10, 16, 22, 0.45);
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        user-select: none;
        pointer-events: none;
        white-space: nowrap;
      }
      .debug-overlay {
        position: absolute;
        left: 16px;
        bottom: 44px;
        display: none;
        width: min(520px, calc(100vw - 32px));
        max-height: calc(100vh - 132px);
        overflow: auto;
        box-sizing: border-box;
        padding: 10px 12px 12px;
        border-radius: 8px;
        background: rgba(7, 11, 15, 0.78);
        color: #e8eef4;
        font-size: 11px;
        line-height: 1.25;
        user-select: none;
        pointer-events: none;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      }
      .debug-overlay.visible {
        display: block;
      }
      .debug-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        color: #ffc63a;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }
      .debug-title span {
        color: rgba(232, 238, 244, 0.62);
        font-weight: 400;
        letter-spacing: 0;
      }
      .debug-section {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
      }
      .debug-section h2,
      .debug-ai h3 {
        margin: 0 0 6px;
        font-size: 12px;
        color: #ffc63a;
      }
      .debug-ai {
        margin-top: 8px;
      }
      .debug-ai h3 {
        display: flex;
        justify-content: space-between;
        color: #e8eef4;
      }
      .debug-ai h3 span {
        color: rgba(232, 238, 244, 0.62);
        font-weight: 400;
      }
      .debug-grid {
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr);
        gap: 3px 10px;
        align-items: baseline;
      }
      .debug-grid span {
        color: rgba(232, 238, 244, 0.56);
      }
      .debug-grid b {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #f5f8fb;
        font-weight: 600;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .hud-race {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 14px;
        align-items: center;
        padding: 10px 16px;
        border-radius: 8px;
        background: rgba(10, 16, 22, 0.55);
        color: #e8eef4;
        user-select: none;
        pointer-events: none;
      }
      .hud-arrow {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        color: #ffc63a;
        transform-origin: 50% 50%;
        transition: transform 90ms linear;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.5));
      }
      .hud-arrow svg {
        display: block;
      }
      .hud-time {
        font-size: 24px;
        font-weight: 700;
        line-height: 1.1;
      }
      .hud-cp {
        font-size: 12px;
        opacity: 0.85;
      }
      .hud-turn {
        margin-top: 2px;
        color: #ffc63a;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 1.1;
        text-transform: uppercase;
        white-space: nowrap;
      }
      .hud-radar {
        position: relative;
        width: 66px;
        height: 66px;
        flex: 0 0 66px;
        border-radius: 50%;
        background:
          linear-gradient(rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08)) 50% 50% / 1px 54px
            no-repeat,
          linear-gradient(90deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08)) 50% 50% /
            54px 1px no-repeat,
          rgba(2, 7, 10, 0.28);
        box-shadow:
          inset 0 0 0 1px rgba(255, 255, 255, 0.16),
          inset 0 0 18px rgba(0, 0, 0, 0.3);
      }
      .hud-radar-ring {
        position: absolute;
        inset: 10px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 50%;
      }
      .hud-radar-car {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 0;
        height: 0;
        transform: translate(-50%, -50%);
        border-right: 5px solid transparent;
        border-bottom: 12px solid #e8eef4;
        border-left: 5px solid transparent;
        filter: drop-shadow(0 1px 1px rgba(0, 0, 0, 0.7));
      }
      .hud-radar-dot {
        position: absolute;
        left: 50%;
        top: 50%;
        width: 7px;
        height: 7px;
        margin: -3.5px 0 0 -3.5px;
        border-radius: 50%;
        background: rgba(159, 180, 200, 0.85);
        box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.35);
      }
      .hud-radar-dot-next {
        width: 10px;
        height: 10px;
        margin: -5px 0 0 -5px;
        background: #ffc63a;
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.45),
          0 0 12px rgba(255, 198, 58, 0.65);
      }
      .hud-radar-dot-passed {
        background: rgba(232, 238, 244, 0.18);
      }
      .hud-radar-dot-far {
        box-shadow:
          0 0 0 1px rgba(0, 0, 0, 0.45),
          0 0 0 3px rgba(255, 198, 58, 0.16);
      }
      .hud-radar-finished .hud-radar-dot {
        opacity: 0.22;
      }
      .hud-pos {
        margin-left: 6px;
        padding-left: 12px;
        border-left: 1px solid rgba(255, 255, 255, 0.18);
        font-size: 26px;
        font-weight: 700;
        line-height: 1;
        color: #e8eef4;
      }
      .hud-pos small {
        font-size: 12px;
        font-weight: 400;
        opacity: 0.7;
      }
      .hud-pos-lead {
        color: #ffc63a;
      }
      .hud-standings {
        position: absolute;
        top: 16px;
        right: 108px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(10, 16, 22, 0.55);
        color: #e8eef4;
        font-size: 12px;
        user-select: none;
        pointer-events: none;
        min-width: 150px;
      }
      .hud-stand {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 2px 0;
        opacity: 0.82;
      }
      .hud-stand-you {
        opacity: 1;
        font-weight: 700;
      }
      .hud-rank {
        width: 12px;
        text-align: right;
        opacity: 0.7;
      }
      .hud-sw {
        width: 9px;
        height: 9px;
        border-radius: 2px;
        flex: 0 0 auto;
      }
      .hud-sw-you {
        background: #b13325;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.5);
      }
      .hud-name {
        flex: 1 1 auto;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .hud-detail {
        opacity: 0.75;
        font-variant-numeric: tabular-nums;
      }
      .audio-settings {
        position: absolute;
        top: 16px;
        right: 16px;
        color: #e8eef4;
        user-select: none;
        z-index: 5;
      }
      .audio-settings-toggle {
        height: 34px;
        padding: 0 10px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        background: rgba(10, 16, 22, 0.7);
        color: #ffc63a;
        font: inherit;
        font-size: 12px;
        cursor: pointer;
      }
      .audio-settings-toggle[aria-expanded='true'] {
        border-color: rgba(255, 198, 58, 0.42);
        background: rgba(16, 22, 28, 0.86);
      }
      .audio-settings-menu {
        display: none;
        width: 208px;
        margin-top: 8px;
        padding: 10px 12px;
        border-radius: 8px;
        background: rgba(7, 11, 15, 0.86);
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      }
      .audio-settings-menu.visible {
        display: grid;
        gap: 8px;
      }
      .audio-settings label {
        display: grid;
        grid-template-columns: 64px 1fr;
        gap: 8px;
        align-items: center;
        font-size: 12px;
      }
      .audio-settings input {
        width: 100%;
        accent-color: #ffc63a;
      }
      .audio-settings-check input {
        width: auto;
        justify-self: end;
      }
      .ui-overlay {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: rgba(8, 13, 18, 0.62);
        color: #e8eef4;
        user-select: none;
        cursor: pointer;
      }
      .ui-overlay.visible {
        display: flex;
      }
      .ui-overlay h1 {
        font-size: 56px;
        letter-spacing: 0.18em;
        margin: 0 0 4px;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
      }
      .ui-tag {
        margin: 0 0 24px;
        opacity: 0.8;
        letter-spacing: 0.08em;
      }
      .ui-place {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.06em;
        margin: 0;
      }
      .ui-time {
        font-size: 44px;
        font-weight: 700;
        margin: 4px 0;
        color: #ffc63a;
      }
      .ui-countdown {
        font-size: 96px;
        line-height: 0.95;
        margin-bottom: 10px;
        color: #ffc63a;
      }
      .ui-summary {
        display: flex;
        gap: 18px;
        justify-content: center;
        margin: 6px 0 14px;
        color: rgba(232, 238, 244, 0.78);
        font-size: 13px;
      }
      .ui-results {
        display: grid;
        gap: 4px;
        width: min(360px, calc(100vw - 36px));
        margin: 0 0 18px;
        font-size: 13px;
      }
      .ui-result {
        display: grid;
        grid-template-columns: 24px minmax(0, 1fr) 76px;
        gap: 8px;
        align-items: center;
        padding: 5px 8px;
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.06);
      }
      .ui-result span {
        color: rgba(232, 238, 244, 0.72);
        font-variant-numeric: tabular-nums;
      }
      .ui-result span:last-child {
        text-align: right;
      }
      .ui-result b {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .ui-result-you {
        background: rgba(255, 198, 58, 0.18);
      }
      .ui-controls {
        display: grid;
        grid-template-columns: auto auto;
        gap: 6px 18px;
        font-size: 14px;
        margin-bottom: 22px;
      }
      .ui-controls span:nth-child(odd) {
        text-align: right;
        font-weight: 700;
        color: #ffc63a;
      }
      .ui-controls span:nth-child(even) {
        text-align: left;
        opacity: 0.85;
      }
      .ui-course {
        display: grid;
        grid-template-columns: repeat(2, minmax(132px, 1fr));
        gap: 10px;
        width: min(420px, calc(100vw - 48px));
        margin: 0 0 18px;
        cursor: default;
      }
      .ui-course label {
        display: grid;
        grid-template-columns: 1fr;
        gap: 5px;
        text-align: left;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(232, 238, 244, 0.72);
      }
      .ui-course select {
        height: 34px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 6px;
        background: rgba(10, 16, 22, 0.82);
        color: #e8eef4;
        font: inherit;
        font-size: 13px;
        letter-spacing: 0;
        outline: none;
      }
      .ui-course select:focus {
        border-color: rgba(255, 198, 58, 0.5);
      }
      .ui-hint {
        max-width: 440px;
        font-size: 13px;
        opacity: 0.7;
        margin: 0 16px 26px;
      }
      .ui-action {
        font-size: 15px;
        letter-spacing: 0.1em;
        color: #ffc63a;
        animation: ui-pulse 1.6s ease-in-out infinite;
        margin: 0;
      }
      .location-toast {
        position: absolute;
        top: 74px;
        left: 50%;
        transform: translateX(-50%) translateY(-6px);
        padding: 7px 12px;
        border-radius: 6px;
        background: rgba(7, 11, 15, 0.66);
        color: #e8eef4;
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        pointer-events: none;
        opacity: 0;
        transition:
          opacity 180ms ease,
          transform 180ms ease;
        z-index: 4;
      }
      .location-toast.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
      @keyframes ui-pulse {
        50% {
          opacity: 0.45;
        }
      }
      @media (max-width: 700px) {
        .hud-panel {
          top: 8px;
          left: 8px;
          padding: 8px 10px;
        }
        .hud-speed {
          font-size: 24px;
        }
        .hud-race {
          top: 72px;
          left: 8px;
          right: 8px;
          transform: none;
          gap: 8px;
          justify-content: center;
          padding: 8px 10px;
        }
        .hud-arrow {
          width: 28px;
          height: 28px;
        }
        .hud-time {
          font-size: 20px;
        }
        .hud-cp {
          font-size: 11px;
        }
        .hud-turn {
          font-size: 10px;
        }
        .hud-radar {
          width: 48px;
          height: 48px;
          flex-basis: 48px;
          background:
            linear-gradient(rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08)) 50% 50% / 1px 38px
              no-repeat,
            linear-gradient(90deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.08)) 50% 50% /
              38px 1px no-repeat,
            rgba(2, 7, 10, 0.28);
        }
        .hud-radar-ring {
          inset: 8px;
        }
        .hud-radar-car {
          border-right-width: 4px;
          border-bottom-width: 10px;
          border-left-width: 4px;
        }
        .hud-pos {
          display: none;
        }
        .hud-standings {
          top: 156px;
          right: 8px;
          min-width: 132px;
          font-size: 11px;
        }
        .location-toast {
          top: 200px;
          max-width: calc(100vw - 32px);
          font-size: 11px;
          text-align: center;
        }
        .audio-settings {
          top: auto;
          right: 8px;
          bottom: 44px;
        }
        .audio-settings-menu {
          position: absolute;
          right: 0;
          bottom: 42px;
        }
        .hud-help {
          right: 8px;
          bottom: 8px;
          left: 8px;
          transform: none;
          white-space: normal;
          text-align: center;
          font-size: 10px;
        }
        .debug-overlay {
          top: 246px;
          right: 8px;
          bottom: 56px;
          left: 8px;
          width: auto;
          max-height: calc(100vh - 302px);
        }
        .ui-overlay h1 {
          font-size: 44px;
        }
        .ui-tag {
          margin-bottom: 14px;
        }
        .ui-controls {
          margin-bottom: 16px;
          font-size: 12px;
        }
        .ui-course {
          grid-template-columns: 1fr;
          gap: 8px;
          max-width: 240px;
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
