<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="icon"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🚙</text></svg>"
    />
    <title>Terep4 — off-road</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        overflow: hidden;
        background: #0c1014;
        font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      }
      #app {
        position: fixed;
        inset: 0;
      }
      #app canvas {
        display: block;
      }
      .hud-panel {
        position: absolute;
        top: 16px;
        left: 16px;
        padding: 10px 14px;
        border-radius: 8px;
        background: rgba(10, 16, 22, 0.55);
        color: #e8eef4;
        user-select: none;
        pointer-events: none;
      }
      .hud-speed {
        font-size: 30px;
        font-weight: 700;
        line-height: 1.1;
      }
      .hud-speed small {
        font-size: 13px;
        font-weight: 400;
        opacity: 0.7;
      }
      .hud-row {
        display: flex;
        gap: 10px;
        align-items: baseline;
        font-size: 13px;
        opacity: 0.9;
      }
      .hud-slide {
        color: #ffb454;
        font-weight: 700;
        visibility: hidden;
      }
      .hud-help {
        position: absolute;
        bottom: 14px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(232, 238, 244, 0.75);
        background: rgba(10, 16, 22, 0.45);
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        user-select: none;
        pointer-events: none;
        white-space: nowrap;
      }
      .debug-overlay {
        position: absolute;
        left: 16px;
        bottom: 44px;
        display: none;
        width: min(520px, calc(100vw - 32px));
        max-height: calc(100vh - 132px);
        overflow: auto;
        box-sizing: border-box;
        padding: 10px 12px 12px;
        border-radius: 8px;
        background: rgba(7, 11, 15, 0.78);
        color: #e8eef4;
        font-size: 11px;
        line-height: 1.25;
        user-select: none;
        pointer-events: none;
        box-shadow: 0 12px 32px rgba(0, 0, 0, 0.28);
      }
      .debug-overlay.visible {
        display: block;
      }
      .debug-title {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
        color: #ffc63a;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
      }
      .debug-title span {
        color: rgba(232, 238, 244, 0.62);
        font-weight: 400;
        letter-spacing: 0;
      }
      .debug-section {
        margin-top: 10px;
        padding-top: 8px;
        border-top: 1px solid rgba(255, 255, 255, 0.12);
      }
      .debug-section h2,
      .debug-ai h3 {
        margin: 0 0 6px;
        font-size: 12px;
        color: #ffc63a;
      }
      .debug-ai {
        margin-top: 8px;
      }
      .debug-ai h3 {
        display: flex;
        justify-content: space-between;
        color: #e8eef4;
      }
      .debug-ai h3 span {
        color: rgba(232, 238, 244, 0.62);
        font-weight: 400;
      }
      .debug-grid {
        display: grid;
        grid-template-columns: max-content minmax(0, 1fr);
        gap: 3px 10px;
        align-items: baseline;
      }
      .debug-grid span {
        color: rgba(232, 238, 244, 0.56);
      }
      .debug-grid b {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        color: #f5f8fb;
        font-weight: 600;
        white-space: nowrap;
        font-variant-numeric: tabular-nums;
      }
      .hud-race {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 14px;
        align-items: center;
        padding: 10px 16px;
        border-radius: 8px;
        background: rgba(10, 16, 22, 0.55);
        color: #e8eef4;
        user-select: none;
        pointer-events: none;
      }
      .hud-arrow {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 34px;
        height: 34px;
        color: #ffc63a;
        transform-origin: 50% 50%;
        transition: transform 90ms linear;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.5));
      }
      .hud-arrow svg {
        display: block;
      }
      .hud-time {
        font-size: 24px;
        font-weight: 700;
        line-height: 1.1;
      }
      .hud-cp {
        font-size: 12px;
        opacity: 0.85;
      }
      .hud-pos {
        margin-left: 6px;
        padding-left: 12px;
        border-left: 1px solid rgba(255, 255, 255, 0.18);
        font-size: 26px;
        font-weight: 700;
        line-height: 1;
        color: #e8eef4;
      }
      .hud-pos small {
        font-size: 12px;
        font-weight: 400;
        opacity: 0.7;
      }
      .hud-pos-lead {
        color: #ffc63a;
      }
      .hud-standings {
        position: absolute;
        top: 16px;
        right: 16px;
        padding: 8px 10px;
        border-radius: 8px;
        background: rgba(10, 16, 22, 0.55);
        color: #e8eef4;
        font-size: 12px;
        user-select: none;
        pointer-events: none;
        min-width: 150px;
      }
      .hud-stand {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 2px 0;
        opacity: 0.82;
      }
      .hud-stand-you {
        opacity: 1;
        font-weight: 700;
      }
      .hud-rank {
        width: 12px;
        text-align: right;
        opacity: 0.7;
      }
      .hud-sw {
        width: 9px;
        height: 9px;
        border-radius: 2px;
        flex: 0 0 auto;
      }
      .hud-sw-you {
        background: #b13325;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.5);
      }
      .hud-name {
        flex: 1 1 auto;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .hud-detail {
        opacity: 0.75;
        font-variant-numeric: tabular-nums;
      }
      .ui-overlay {
        position: absolute;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        background: rgba(8, 13, 18, 0.62);
        color: #e8eef4;
        user-select: none;
        cursor: pointer;
      }
      .ui-overlay.visible {
        display: flex;
      }
      .ui-overlay h1 {
        font-size: 56px;
        letter-spacing: 0.18em;
        margin: 0 0 4px;
        text-shadow: 0 4px 24px rgba(0, 0, 0, 0.6);
      }
      .ui-tag {
        margin: 0 0 24px;
        opacity: 0.8;
        letter-spacing: 0.08em;
      }
      .ui-place {
        font-size: 30px;
        font-weight: 700;
        letter-spacing: 0.06em;
        margin: 0;
      }
      .ui-time {
        font-size: 44px;
        font-weight: 700;
        margin: 4px 0;
        color: #ffc63a;
      }
      .ui-controls {
        display: grid;
        grid-template-columns: auto auto;
        gap: 6px 18px;
        font-size: 14px;
        margin-bottom: 22px;
      }
      .ui-controls span:nth-child(odd) {
        text-align: right;
        font-weight: 700;
        color: #ffc63a;
      }
      .ui-controls span:nth-child(even) {
        text-align: left;
        opacity: 0.85;
      }
      .ui-hint {
        max-width: 440px;
        font-size: 13px;
        opacity: 0.7;
        margin: 0 16px 26px;
      }
      .ui-action {
        font-size: 15px;
        letter-spacing: 0.1em;
        color: #ffc63a;
        animation: ui-pulse 1.6s ease-in-out infinite;
        margin: 0;
      }
      @keyframes ui-pulse {
        50% {
          opacity: 0.45;
        }
      }
      @media (max-width: 700px) {
        .hud-panel {
          top: 8px;
          left: 8px;
          padding: 8px 10px;
        }
        .hud-speed {
          font-size: 24px;
        }
        .hud-race {
          top: 8px;
          left: auto;
          right: 8px;
          transform: none;
          gap: 8px;
          padding: 8px 10px;
        }
        .hud-arrow {
          width: 28px;
          height: 28px;
        }
        .hud-time {
          font-size: 20px;
        }
        .hud-cp {
          font-size: 11px;
        }
        .hud-pos {
          display: none;
        }
        .hud-standings {
          top: 84px;
          right: 8px;
          min-width: 132px;
          font-size: 11px;
        }
        .hud-help {
          right: 8px;
          bottom: 8px;
          left: 8px;
          transform: none;
          white-space: normal;
          text-align: center;
          font-size: 10px;
        }
        .debug-overlay {
          top: 174px;
          right: 8px;
          bottom: 56px;
          left: 8px;
          width: auto;
          max-height: calc(100vh - 230px);
        }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
